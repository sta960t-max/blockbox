<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Box | Your Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">BLACK<span>BOX</span></div>
        <a href="index.html" class="btn">Back to Shop</a>
    </nav>

    <div class="cart-container">
        <h2>Your Shopping Cart</h2>
        <div id="cart-items-list">
            <!-- Items added will appear here -->
        </div>
        <div class="cart-summary">
            <h3>Total Amount: ₹<span id="total-price">0</span></h3>
            <button class="btn checkout-btn" onclick="checkout()">Checkout Now</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Sirf cart page ke liye display logic chalayein
        window.onload = displayCart;
    </script>
</body>
</html>
