<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Box | Premium Computer Accessories</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">BLACK<span>BOX</span></div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Cart</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <h1>Upgrade Your Setup</h1>
        <p>Premium Accessories with 3D Neumorphic Design</p>
    </header>

    <!-- Product Grid -->
    <section class="product-container">
        <!-- Product Card 1 -->
        <div class="card" data-tilt>
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?q=80&w=200" alt="Monitor">
            </div>
            <div class="content">
                <h3>Gaming Monitor</h3>
                <p>4K Ultra HD, 144Hz</p>
                <button class="btn">Buy Now</button>
            </div>
        </div>

        <!-- Product Card 2 -->
        <div class="card" data-tilt>
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1541140532154-b024d715b909?q=80&w=200" alt="Keyboard">
            </div>
            <div class="content">
                <h3>Mechanical Keyboard</h3>
                <p>RGB Backlit, Blue Switches</p>
                <button class="btn">Buy Now</button>
            </div>
        </div>

        <!-- Product Card 3 -->
        <div class="card" data-tilt>
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?q=80&w=200" alt="Mouse">
            </div>
            <div class="content">
                <h3>Wireless Mouse</h3>
                <p>High Precision, Ergonomic</p>
                <button class="btn">Buy Now</button>
            </div>
        </div>
    </section>

    <!-- JS Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
